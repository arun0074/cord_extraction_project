# =============================================================================
# configs/config.yaml
# Central configuration — all parameters with their justification documented
# =============================================================================

dataset:
  name: "naver-clova-ix/cord-v2"
  train_subset: 800       # ~67% of full train set — sufficient for LoRA fine-tuning
  val_subset: 100
  test_subset: 100

model:
  name: "microsoft/layoutlmv3-base"
  # WHY layoutlmv3-base:
  #   - Jointly encodes image patches, OCR text, and bounding boxes
  #   - Pretrained on IIT-CDIP (11M document images) — directly relevant to receipts
  #   - 125M params (base) fits on Colab T4 with LoRA and image input
  #   - v3 outperforms v1/v2 on FUNSD, CORD, XFUND benchmarks

peft:
  method: "lora"
  r: 8
  # WHY r=8:
  #   - 800 train samples → r=4 underfits (9-class NER needs more capacity)
  #   - r=8 balances expressiveness and regularisation for this data scale
  #   - r=16/32 risk memorisation on small datasets
  lora_alpha: 16
  # WHY alpha=16:
  #   - effective_scale = alpha/r = 2.0 — standard LoRA recommendation
  #   - Keeps base model features dominant while allowing task adaptation
  lora_dropout: 0.1
  # WHY 0.1:
  #   - Matches dropout in base model attention layers (consistency)
  #   - Small dataset requires regularisation; 0.0 overfits by epoch 5
  target_modules: ["query", "value"]
  # WHY query+value only:
  #   - Key matrix is less task-specific (LoRA paper finding)
  #   - Avoids over-parameterisation of the adaptation
  modules_to_save: ["classifier"]
  # WHY save classifier:
  #   - Classifier head is randomly initialised → must fully train
  #   - All other weights are pretrained → LoRA adapts them

training:
  max_length: 512
  # WHY 512:
  #   - Analysis shows p95 token length ≈ 490 (CORD receipts are verbose)
  #   - LayoutLMv3 hard limit is 512; using max avoids truncation on long receipts
  num_epochs: 15
  train_batch_size: 4
  eval_batch_size: 8
  gradient_accumulation_steps: 4    # effective batch = 4×4 = 16
  learning_rate: 2.0e-4
  # WHY 2e-4:
  #   - LoRA recommends 5-10× higher LR than full fine-tune (which uses 5e-5)
  #   - 2e-4 is the most cited NER LoRA learning rate
  warmup_ratio: 0.1
  weight_decay: 0.01
  lr_scheduler: "cosine"
  eval_steps: 50
  save_steps: 50
  early_stop_patience: 3
  metric_for_best_model: "eval_f1"  # entity-level F1 (seqeval)
  seed: 42

labels:
  - "O"
  - "B-VENDOR"
  - "I-VENDOR"
  - "B-DATE"
  - "I-DATE"
  - "B-TOTAL"
  - "I-TOTAL"
  - "B-RECEIPT_ID"
  - "I-RECEIPT_ID"

paths:
  output_dir: "outputs/checkpoints"
  db_path: "outputs/receipts.db"
  eval_dir: "outputs/evaluation"
  analysis_dir: "outputs/analysis"

api:
  host: "0.0.0.0"
  port: 8000

ui:
  host: "0.0.0.0"
  port: 7860
  share: true    # creates public Gradio URL (useful for Colab)
